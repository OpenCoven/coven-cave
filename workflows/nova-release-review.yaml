# Cave Workflow manifest — local source for the Workflow Studio.
# Scanned by src/lib/workflow-source.ts when the daemon has no workflow engine.
id: nova-release-review
version: 1.0.0
name: Release Review
summary: Gate a release behind Val's approval, run Nova's review, lint the manifest, and emit a brief.
familiar: nova
pattern: sequential
tags:
  - release
  - review
limits:
  max_agents: 4
  timeout_s: 1800
  cost_ceiling_usd: 5
permissions:
  - repo.read
visibility:
  public: true
  coven_cave: true
  coven_code: true
steps:
  - id: gate
    kind: human-gate
    name: Val approval
    uses: valentina
    summary: Hold until Val approves cutting the release.
  - id: review
    kind: agent
    name: Nova review
    uses: nova
    summary: Review the release diff for regressions and missing changelog entries.
    requires:
      - gate
  - id: lint
    kind: skill
    name: Schema lint
    uses: cwf-validator@^1.0.0
    summary: Validate the release manifest against the workflow schema.
    requires:
      - review
  - id: brief
    kind: tool
    name: Release brief
    uses: cave.output
    summary: Produce the human-facing release brief.
    requires:
      - lint
