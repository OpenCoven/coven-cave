id: coven-orchestration
version: 0.1.0
name: Coven Orchestration
summary: Coordinate familiar lanes, monitor gates, preserve memory, and report completion with evidence.
familiar: nova
pattern: fan-out-and-synthesize
tags:
  - orchestration
  - handoff
limits:
  max_agents: 8
  timeout_s: 3600
  cost_ceiling_usd: 10
permissions:
  - memory.read
  - file.read
  - file.write
  - sessions.spawn
visibility:
  public: true
  coven_cave: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: define-goal
    kind: agent
    name: Define goal and gates
    uses: nova
    summary: Capture Val's goal, hard constraints, approval gates, and completion proof.
    requires:
      - input
  - id: route-lanes
    kind: workflow
    name: Route lanes
    uses: coordination-router
    summary: Decide which familiars own research, implementation, comms, memory, and strategy.
    requires:
      - define-goal
  - id: approval-gate
    kind: human-gate
    name: Delegation approval
    uses: valentina
    summary: Hold before spawning sessions or external actions when the plan requires them.
    requires:
      - route-lanes
  - id: dispatch-work
    kind: agent
    name: Dispatch work
    uses: nova
    summary: Prepare bounded handoffs with context, acceptance criteria, and stop conditions.
    requires:
      - approval-gate
  - id: monitor-gates
    kind: agent
    name: Monitor gates
    uses: nova
    summary: Track review status, verification, unresolved blockers, and owner handoffs.
    requires:
      - dispatch-work
  - id: preserve-memory
    kind: workflow
    name: Preserve memory
    uses: archive-memory
    summary: Capture durable decisions and open loops without leaking private context.
    requires:
      - monitor-gates
  - id: completion-report
    kind: tool
    name: Completion report
    uses: cave.output
    summary: Report outcome, evidence, remaining risks, and whether the work can be archived.
    requires:
      - preserve-memory
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - completion-report
