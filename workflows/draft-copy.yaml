id: draft-copy
version: 0.1.0
name: Draft Copy
summary: Turn product intent into clear copy, revise tone, check claims, and prepare approval-ready drafts.
familiar: charm
pattern: generate-and-filter
tags:
  - copy
  - writing
limits:
  max_agents: 4
  timeout_s: 1800
  cost_ceiling_usd: 4
permissions:
  - file.read
  - file.write
visibility:
  public: true
  coven_cave: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: define-brief
    kind: agent
    name: Define brief
    uses: charm
    summary: Capture audience, surface, desired outcome, voice, constraints, and source material.
    requires:
      - input
  - id: generate-options
    kind: agent
    name: Generate options
    uses: charm
    summary: Draft multiple copy directions with different emphasis and length.
    requires:
      - define-brief
  - id: filter-claims
    kind: agent
    name: Filter claims
    uses: charm
    summary: Remove vague hype, unsupported claims, and anything that needs factual research.
    requires:
      - generate-options
  - id: revise-tone
    kind: agent
    name: Revise tone
    uses: charm
    summary: Shape the strongest option for clarity, platform fit, and Val's voice.
    requires:
      - filter-claims
  - id: approval-notes
    kind: tool
    name: Approval notes
    uses: cave.output
    summary: Save the final draft, alternates, assumptions, and approval needs.
    requires:
      - revise-tone
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - approval-notes
