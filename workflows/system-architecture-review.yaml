id: system-architecture-review
version: 0.1.0
name: System Architecture Review
summary: Gather context, compare designs, define trust boundaries, and prepare an implementation-ready plan.
familiar: nova
pattern: adversarial-verification
tags:
  - architecture
  - planning
limits:
  max_agents: 6
  timeout_s: 3000
  cost_ceiling_usd: 8
permissions:
  - memory.read
  - file.read
  - file.write
visibility:
  public: true
  coven_cave: true
steps:
  - id: gather-context
    kind: agent
    name: Gather context
    uses: nova
    summary: Read requirements, existing architecture, repo boundaries, and relevant memory.
  - id: define-boundaries
    kind: agent
    name: Define boundaries
    uses: nova
    summary: Identify data flow, trust boundaries, ownership, and approval-sensitive surfaces.
    requires:
      - gather-context
  - id: compare-approaches
    kind: agent
    name: Compare approaches
    uses: nova
    summary: Evaluate two or three designs with tradeoffs, risks, and migration cost.
    requires:
      - define-boundaries
  - id: adversarial-review
    kind: agent
    name: Adversarial review
    uses: nova
    summary: Challenge the recommended design for hidden coupling, unsafe trust, and rollout risk.
    requires:
      - compare-approaches
  - id: approval-gate
    kind: human-gate
    name: Architecture approval
    uses: valentina
    summary: Hold before high-trust config, commits, merges, publication, or irreversible changes.
    requires:
      - adversarial-review
  - id: implementation-plan
    kind: skill
    name: Implementation plan
    uses: writing-plans
    summary: Prepare a scoped plan with tasks, tests, gates, and handoff criteria.
    requires:
      - approval-gate
