id: synthesize-sources
version: 0.1.0
name: Synthesize Sources
summary: Combine multiple completed sources into a durable cited synthesis instead of a loose link pile.
familiar: sage
pattern: fan-out-and-synthesize
tags:
  - library
  - synthesis
limits:
  max_agents: 5
  timeout_s: 2400
  cost_ceiling_usd: 6
permissions:
  - file.read
  - file.write
  - web.read
visibility:
  public: true
  coven_cave: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: select-cluster
    kind: agent
    name: Select source cluster
    uses: sage
    summary: Identify the topic cluster and confirm enough sources are ready for synthesis.
    requires:
      - input
  - id: extract-source-notes
    kind: agent
    name: Extract source notes
    uses: sage
    summary: Pull key claims, evidence, caveats, and bibliographic details from each source.
    requires:
      - select-cluster
  - id: compare-claims
    kind: agent
    name: Compare claims
    uses: sage
    summary: Group agreement, disagreement, uncertainty, and source-quality differences.
    requires:
      - extract-source-notes
  - id: write-synthesis
    kind: agent
    name: Write synthesis
    uses: sage
    summary: Produce a cited synthesis with practical implications and open questions.
    requires:
      - compare-claims
  - id: save-synthesis
    kind: tool
    name: Save synthesis
    uses: cave.output
    summary: Save the synthesis doc and update library metadata for retrieval.
    requires:
      - write-synthesis
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - save-synthesis
