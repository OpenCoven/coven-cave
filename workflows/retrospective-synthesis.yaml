id: retrospective-synthesis
version: 0.1.0
name: Retrospective Synthesis
summary: Read curated context, extract decisions and patterns, and propose memory candidates with uncertainty.
familiar: echo
pattern: sequential
tags:
  - memory
  - retrospective
limits:
  max_agents: 4
  timeout_s: 1800
  cost_ceiling_usd: 4
permissions:
  - memory.read
  - file.read
  - file.write
visibility:
  public: true
  coven_cave: true
steps:
  - id: intake-packet
    kind: agent
    name: Intake packet
    uses: echo
    summary: Read curated notes, project summaries, and explicit retrospective scope.
  - id: extract-decisions
    kind: agent
    name: Extract decisions
    uses: echo
    summary: Identify decisions, repeated blockers, unresolved tensions, and changed assumptions.
    requires:
      - intake-packet
  - id: find-patterns
    kind: agent
    name: Find patterns
    uses: echo
    summary: Name recurring signals and distinguish supported patterns from missing context.
    requires:
      - extract-decisions
  - id: propose-memory
    kind: agent
    name: Propose memory candidates
    uses: echo
    summary: Select candidates worth preserving and mark uncertainty or privacy risks.
    requires:
      - find-patterns
  - id: write-retro
    kind: tool
    name: Write retrospective
    uses: cave.output
    summary: Save the retrospective with decisions, open loops, and memory-review notes.
    requires:
      - propose-memory
