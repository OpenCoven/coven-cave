    const enabled = this.state.phoneWrites;
    const by = this.state.permsBy;
    const levels = [["none", "None", "var(--text-muted)"], ["read", "Read", "#5aa2ff"], ["write", "Write", "var(--color-success)"], ["admin", "Admin", "var(--accent-presence)"]];
    // streamlined level selector — n options as a compact segmented pill
    const selector = (fam, proj) => {
      const cur = (this.state.perms[fam] && this.state.perms[fam][proj]) || "none";
      return el("div", { style: { display: "inline-flex", background: "var(--bg-sunken,var(--bg-base))", border: "1px solid var(--border-hairline)", borderRadius: 999, padding: 2, gap: 2 } },
        levels.map(([id, lab, col]) => {
          const on = cur === id;
          return el("button", { key: id, onClick: () => this.setPerm(fam, proj, id), disabled: !enabled, "aria-pressed": on, title: lab, style: {
            appearance: "none", border: "none", cursor: enabled ? "pointer" : "default", fontSize: 10.5, fontWeight: 600, padding: "4px 9px", borderRadius: 999,
            color: on ? (id === "none" ? "var(--text-primary)" : col) : "var(--text-muted)",
            background: on ? (id === "none" ? "var(--bg-hover)" : "color-mix(in oklch, " + col + " 18%, transparent)") : "transparent",
            opacity: enabled ? 1 : 0.55 } }, lab);
        }));
    };
    // rows depend on grouping: outer = familiar or project; inner = the other axis
    const outer = by === "familiar" ? fams.map(f => ({ id: f.id, name: f.name, color: famColor[f.name], icon: "cat-fill", inner: projects, innerFmt: p => p, get: p => [f.name, p] }))
      : projects.map(p => ({ id: p, name: p, color: "var(--text-muted)", icon: "folder-fill", mono: true, inner: fams.map(f => f.name), innerFmt: n => n, get: n => [n, p] }));
    return el("div", { style: { position: "absolute", top: 50, left: 0, right: 0, bottom: 0, zIndex: 47, background: "var(--bg-base)", display: "flex", flexDirection: "column" } },
      el("div", { style: { flex: "none", display: "flex", alignItems: "center", gap: 8, padding: "6px 12px 10px" } },
        el(C.IconButton, { icon: "ph:caret-left", "aria-label": "Back", onClick: () => this.setState({ permsOpen: false }) }),
        el("div", { style: { flex: 1, fontFamily: "var(--font-inter)", fontWeight: 600, fontSize: 18, letterSpacing: "-.01em" } }, "Permissions"),
      ),
      el("div", { style: { flex: "none", padding: "0 16px 10px" } },
        el(C.Segmented, { options: ["familiar", "project"], value: by, onChange: v => this.setState({ permsBy: v }), getLabel: o => o === "familiar" ? "By familiar" : "By project", ariaLabel: "Group permissions by" })),
      el("div", { className: "cc-scroll", style: { flex: 1, minHeight: 0, overflowY: "auto", padding: "0 16px 20px", display: "flex", flexDirection: "column", gap: 10 } },
        !enabled ? el("div", { style: { display: "flex", alignItems: "center", gap: 9, whiteSpace: "nowrap", fontSize: 12, lineHeight: 1.4, color: "var(--color-warning)", background: "color-mix(in oklch, var(--color-warning) 12%, transparent)", border: "1px solid color-mix(in oklch, var(--color-warning) 38%, var(--border-hairline))", borderRadius: "var(--radius-card)", padding: "10px 12px", overflow: "hidden" } },
          el(C.Icon, { name: "ph:lock-simple-fill", width: 15, style: { flexShrink: 0 } }),
          el("span", { style: { overflow: "hidden", textOverflow: "ellipsis" } }, "Read-only — enable changes on desktop.")) : null,
        outer.map(o => el("div", { key: o.id, style: { background: "var(--bg-raised)", border: "1px solid var(--border-hairline)", borderRadius: "var(--radius-card)", overflow: "hidden" } },
          el("div", { style: { display: "flex", alignItems: "center", gap: 9, padding: "10px 13px", borderBottom: "1px solid var(--border-hairline)" } },
            el("span", { style: { width: 24, height: 24, borderRadius: 999, flexShrink: 0, display: "grid", placeItems: "center", background: "color-mix(in oklch, " + o.color + " 24%, var(--bg-elevated))", color: o.color, border: "1px solid color-mix(in oklch, " + o.color + " 38%, transparent)" } }, el(C.Icon, { name: "ph:" + o.icon, width: 12 })),
            el("span", { style: { fontSize: 14, fontWeight: 600, letterSpacing: "-.01em", fontFamily: o.mono ? "var(--font-jetbrains-mono),monospace" : "inherit" } }, o.name)),
          o.inner.map((it, i) => el("div", { key: it, style: { display: "flex", alignItems: "center", gap: 10, padding: "9px 13px", borderTop: i === 0 ? "none" : "1px solid var(--border-hairline)" } },
            el("span", { style: { flex: 1, minWidth: 0, fontSize: 12.5, fontFamily: by === "familiar" ? "var(--font-jetbrains-mono),monospace" : "inherit", color: "var(--text-secondary)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, o.innerFmt(it)),
            selector(...o.get(it)))),
        )),
      ),
    );
  }
}
</script>
