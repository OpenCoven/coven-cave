id: annotate-document
version: 0.1.0
name: Annotate Document
summary: Read a document, extract durable notes, cite exact evidence, and save review-ready annotations.
familiar: sage
pattern: sequential
tags:
  - library
  - annotation
limits:
  max_agents: 3
  timeout_s: 1800
  cost_ceiling_usd: 4
permissions:
  - file.read
  - file.write
visibility:
  public: true
  coven_cave: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: intake
    kind: agent
    name: Document intake
    uses: sage
    summary: Identify the document, requested angle, citation needs, and output location.
    requires:
      - input
  - id: read-pass
    kind: agent
    name: Read for structure
    uses: sage
    summary: Skim sections, headings, claims, and source metadata before writing notes.
    requires:
      - intake
  - id: annotate-claims
    kind: agent
    name: Annotate claims
    uses: sage
    summary: Extract key claims, page or section anchors, caveats, and follow-up questions.
    requires:
      - read-pass
  - id: verify-citations
    kind: agent
    name: Verify citations
    uses: sage
    summary: Check every annotation has accurate source context and uncertainty markers.
    requires:
      - annotate-claims
  - id: save-notes
    kind: tool
    name: Save annotations
    uses: cave.output
    summary: Write the annotation packet to the library with tags and retrieval metadata.
    requires:
      - verify-citations
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - save-notes
