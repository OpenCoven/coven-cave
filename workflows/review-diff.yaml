id: review-diff
version: 0.1.0
name: Review Diff
summary: Inspect a diff or PR for correctness, security, regressions, and missing verification.
familiar: cody
pattern: adversarial-verification
tags:
  - code
  - review
limits:
  max_agents: 4
  timeout_s: 2400
  cost_ceiling_usd: 6
permissions:
  - repo.read
  - command.run
visibility:
  public: true
  coven_cave: true
  coven_code: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: load-context
    kind: agent
    name: Load context
    uses: cody
    summary: Read the diff, requirements, related tests, and touched ownership boundaries.
    requires:
      - input
  - id: inspect-behavior
    kind: agent
    name: Inspect behavior
    uses: cody
    summary: Look for correctness, data, security, lifecycle, and compatibility regressions.
    requires:
      - load-context
  - id: inspect-verification
    kind: agent
    name: Inspect verification
    uses: cody
    summary: Check whether tests and proof match the change's risk and blast radius.
    requires:
      - load-context
  - id: adversarial-pass
    kind: agent
    name: Adversarial pass
    uses: cody
    summary: Try to disprove the apparent safety of the change and reduce false positives.
    requires:
      - inspect-behavior
      - inspect-verification
  - id: report-findings
    kind: tool
    name: Report findings
    uses: cave.output
    summary: Lead with actionable findings by severity, then questions and residual risk.
    requires:
      - adversarial-pass
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - report-findings
