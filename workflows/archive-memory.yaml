id: archive-memory
version: 0.1.0
name: Archive Memory
summary: Capture daily context, isolate durable memory candidates, and hold long-term writes for review.
familiar: echo
pattern: sequential
tags:
  - memory
  - archive
limits:
  max_agents: 4
  timeout_s: 1800
  cost_ceiling_usd: 4
permissions:
  - memory.read
  - file.read
  - file.write
visibility:
  public: true
  coven_cave: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: collect-context
    kind: agent
    name: Collect context
    uses: echo
    summary: Gather daily notes, decisions, open loops, and relevant project summaries.
    requires:
      - input
  - id: separate-records
    kind: agent
    name: Separate records
    uses: echo
    summary: Split facts, decisions, feelings or signals, follow-ups, and raw private context.
    requires:
      - collect-context
  - id: identify-candidates
    kind: agent
    name: Identify candidates
    uses: echo
    summary: Mark durable memory candidates and reject noise, secrets, or weakly supported claims.
    requires:
      - separate-records
  - id: review-gate
    kind: human-gate
    name: Long-term memory approval
    uses: valentina
    summary: Hold before promoting any candidate to long-term memory.
    requires:
      - identify-candidates
  - id: write-archive
    kind: tool
    name: Write archive packet
    uses: cave.output
    summary: Save the approved archive packet with open loops and review notes.
    requires:
      - review-gate
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - write-archive
