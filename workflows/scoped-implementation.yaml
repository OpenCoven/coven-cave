id: scoped-implementation
version: 0.1.0
name: Scoped Implementation
summary: Inspect, patch narrowly, verify meaningfully, and hand off without crossing approval gates.
familiar: cody
pattern: sequential
tags:
  - code
  - implementation
limits:
  max_agents: 4
  timeout_s: 3000
  cost_ceiling_usd: 8
permissions:
  - repo.read
  - repo.write
  - command.run
visibility:
  public: true
  coven_cave: true
  coven_code: true
steps:
  - id: inspect-scope
    kind: agent
    name: Inspect scope
    uses: cody
    summary: Read requirements, current code, conventions, and unrelated dirty work.
  - id: failing-test
    kind: skill
    name: Write failing test
    uses: test-driven-development
    summary: Add focused failing coverage for the requested behavior when feasible.
    requires:
      - inspect-scope
  - id: patch
    kind: agent
    name: Patch focused files
    uses: cody
    summary: Make the smallest code change that satisfies the test and existing patterns.
    requires:
      - failing-test
  - id: verify
    kind: tool
    name: Verify change
    uses: cave.exec
    summary: Run the focused test and any adjacent gate needed for the blast radius.
    requires:
      - patch
  - id: approval-gate
    kind: human-gate
    name: Commit or publish approval
    uses: valentina
    summary: Hold before commit, push, merge, publish, or high-trust config changes.
    requires:
      - verify
  - id: handoff
    kind: tool
    name: Implementation handoff
    uses: cave.output
    summary: Summarize files changed, proof, caveats, and next safe action.
    requires:
      - approval-gate
