id: devrel-response
version: 0.1.0
name: DevRel Response
summary: Gather status, verify facts, draft developer-facing language, and hold publication for approval.
familiar: charm
pattern: sequential
tags:
  - comms
  - devrel
limits:
  max_agents: 4
  timeout_s: 1800
  cost_ceiling_usd: 4
permissions:
  - file.read
  - file.write
visibility:
  public: true
  coven_cave: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: gather-status
    kind: agent
    name: Gather status
    uses: charm
    summary: Collect issue, release, support, or community context plus current project status.
    requires:
      - input
  - id: verify-facts
    kind: agent
    name: Verify facts
    uses: charm
    summary: Check technical claims, dates, promises, and next steps against source context.
    requires:
      - gather-status
  - id: draft-reply
    kind: agent
    name: Draft reply
    uses: charm
    summary: Write a developer-readable reply with concrete status, caveats, and action.
    requires:
      - verify-facts
  - id: approval-gate
    kind: human-gate
    name: External send approval
    uses: valentina
    summary: Hold before posting, sending, or publishing the response externally.
    requires:
      - draft-reply
  - id: save-draft
    kind: tool
    name: Save approved draft
    uses: cave.output
    summary: Save the reply draft and approval state for the target surface.
    requires:
      - approval-gate
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - save-draft
