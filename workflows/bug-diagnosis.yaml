id: bug-diagnosis
version: 0.1.0
name: Bug Diagnosis
summary: Reproduce a failure, isolate the root cause, patch narrowly, and verify the original symptom.
familiar: cody
pattern: sequential
tags:
  - code
  - debugging
limits:
  max_agents: 4
  timeout_s: 2400
  cost_ceiling_usd: 6
permissions:
  - repo.read
  - repo.write
  - command.run
visibility:
  public: true
  coven_cave: true
  coven_code: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: reproduce
    kind: agent
    name: Reproduce failure
    uses: cody
    summary: Run or inspect the failing path before proposing a cause.
    requires:
      - input
  - id: trace
    kind: agent
    name: Trace root cause
    uses: cody
    summary: Follow the symptom through logs, code paths, data, and configuration.
    requires:
      - reproduce
  - id: regression-test
    kind: skill
    name: Write failing regression
    uses: test-driven-development
    summary: Add focused coverage that fails for the diagnosed cause when feasible.
    requires:
      - trace
  - id: patch
    kind: agent
    name: Patch narrowly
    uses: cody
    summary: Apply the smallest code or config change that fixes the root cause.
    requires:
      - regression-test
  - id: verify
    kind: tool
    name: Verify symptom
    uses: cave.exec
    summary: Rerun the regression and the original failing command or runtime probe.
    requires:
      - patch
  - id: handoff
    kind: tool
    name: Diagnosis handoff
    uses: cave.output
    summary: Report root cause, changed files, verification, and residual risk.
    requires:
      - verify
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - handoff
