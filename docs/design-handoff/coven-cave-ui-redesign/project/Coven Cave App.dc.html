                appearance: "none", cursor: enabled ? "pointer" : "default", fontSize: 11, fontWeight: 600, padding: "4px 10px", borderRadius: 999,
                color: m.c, background: "color-mix(in oklch, " + m.c + " 14%, transparent)", border: "1px solid color-mix(in oklch, " + m.c + " 38%, var(--border-hairline))", opacity: enabled ? 1 : 0.7 } }, m.t));
          }),
        )),
      ),
    );
  }
}
</script>
</body>
