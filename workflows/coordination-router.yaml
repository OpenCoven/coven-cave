id: coordination-router
version: 0.1.0
name: Coordination Router
summary: Classify work, select the right familiar lane, prepare handoffs, and surface routing risks.
familiar: astra
pattern: classify-and-act
tags:
  - coordination
  - routing
limits:
  max_agents: 4
  timeout_s: 1200
  cost_ceiling_usd: 3
permissions:
  - memory.read
  - file.read
visibility:
  public: true
  coven_cave: true
steps:
  - id: input
    kind: input
    name: Input
    summary: The input this workflow needs to start.
  - id: classify-task
    kind: agent
    name: Classify task
    uses: astra
    summary: Identify whether the work is research, implementation, memory, comms, strategy, or orchestration.
    requires:
      - input
  - id: map-dependencies
    kind: agent
    name: Map dependencies
    uses: astra
    summary: Name prerequisites, missing context, approval needs, and likely blockers.
    requires:
      - classify-task
  - id: choose-lane
    kind: agent
    name: Choose familiar lane
    uses: astra
    summary: Select the responsible familiar and supporting lanes based on task shape and risk.
    requires:
      - map-dependencies
  - id: escalation-check
    kind: human-gate
    name: Ambiguity approval
    uses: valentina
    summary: Ask before spawning sessions, writing externally, or routing ambiguous ownership.
    requires:
      - choose-lane
  - id: handoff
    kind: tool
    name: Handoff packet
    uses: cave.output
    summary: Emit context, acceptance criteria, stop conditions, owner, and next action.
    requires:
      - escalation-check
  - id: output
    kind: output
    name: Output
    summary: The artifact this workflow produces.
    requires:
      - handoff
