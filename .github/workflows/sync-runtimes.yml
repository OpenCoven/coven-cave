# Sync the accepted runtime registry from OpenCoven/coven-runtimes into
# src/lib/runtime-registry.gen.ts and open a PR when it changed.
#
# Triggers:
#   - repository_dispatch `runtimes-registry-updated` — fired by the
#     notify-downstream workflow in coven-runtimes when registry/** merges.
#   - workflow_dispatch — manual re-run from the Actions tab.
#   - weekly schedule — safety net for missed dispatches.
#
# The PR is never auto-merged: required CI gates it and a human clicks merge.
#
# Setup (one-time): the bot branch/PR must be pushed with SYNC_RUNTIMES_TOKEN —
# a fine-grained PAT for this repo with "Contents: read & write" and
# "Pull requests: read & write". Events created with the workflow's own
# GITHUB_TOKEN never trigger other workflows (GitHub's recursion guard), so a
# PR pushed with it would sit with zero required checks and could never merge.
# The job fails loudly when the secret is missing rather than opening an
# ungated PR.

name: Sync runtimes registry

on:
  repository_dispatch:
    types: [runtimes-registry-updated]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC

permissions:
  contents: read

concurrency:
  group: sync-runtimes
  cancel-in-progress: false

jobs:
  sync:
    name: Sync registry
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Sync from coven-runtimes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-runtimes.mjs

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- src/lib/runtime-registry.gen.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Registry module already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run targeted tests
        if: steps.diff.outputs.changed == 'true'
        run: |
          node scripts/sync-runtimes.test.mjs
          node --experimental-strip-types src/lib/harness-adapters.test.ts
          node --experimental-strip-types src/lib/runtime-models.test.ts

      - name: Require the bot token
        if: steps.diff.outputs.changed == 'true'
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_RUNTIMES_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::SYNC_RUNTIMES_TOKEN is not set. A PR pushed with GITHUB_TOKEN would trigger no required checks (GitHub skips workflows for events created by the workflow token) and could never merge. Create a fine-grained PAT (Contents + Pull requests: read & write on this repo) and add it as the SYNC_RUNTIMES_TOKEN secret."
            exit 1
          fi

      - name: Create or refresh the sync PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_RUNTIMES_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=bot/sync-runtimes
          node --experimental-strip-types -e '
            import("./src/lib/runtime-registry.gen.ts").then((m) => {
              const lines = [
                "Automated sync of the accepted runtime registry from `OpenCoven/coven-runtimes`.",
                "",
                "## Accepted runtimes",
                ...m.REGISTRY_RUNTIMES.map((r) => `- \`${r.id}@${r.version}\` — ${r.label}`),
                "",
                `Source blob: \`${m.REGISTRY_SOURCE.blobSha}\` (ref \`${m.REGISTRY_SOURCE.ref}\`)`,
                "",
                "Review the diff, wait for required checks, then merge. Generated by the `Sync runtimes registry` workflow.",
              ];
              require("node:fs").writeFileSync("/tmp/sync-runtimes-pr-body.md", lines.join("\n"));
            });
          '
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Push with the PAT (not the checkout-persisted GITHUB_TOKEN) so the
          # push event triggers the required CI workflows on the PR.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -B "$BRANCH"
          git add src/lib/runtime-registry.gen.ts
          git commit -m "chore(runtimes): sync accepted registry from coven-runtimes"
          git push -f origin "$BRANCH"
          if gh pr view "$BRANCH" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            gh pr edit "$BRANCH" --body-file /tmp/sync-runtimes-pr-body.md
          else
            gh pr create --base main --head "$BRANCH" \
              --title "chore(runtimes): sync accepted registry from coven-runtimes" \
              --body-file /tmp/sync-runtimes-pr-body.md
          fi
